name: daily-notion-update

on:
  workflow_dispatch:
  schedule:
    # KST 08:30 = UTC 23:30 (previous day)
    - cron: "30 23 * * *"

jobs:
  update-notion:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID }}
      KIWOOM_APP_KEY: ${{ secrets.KIWOOM_APP_KEY }}
      KIWOOM_APP_SECRET: ${{ secrets.KIWOOM_APP_SECRET }}

      # 조건 설정 (Repository Variables 로 옮겨도 됨)
      MIN_CHANGE_PCT: "2"
      MAX_CHANGE_PCT: "25"
      MIN_TRADE_VALUE: "10000000000"
      MIN_MARKET_CAP: "300000000000"
      EXCLUDE_KEYWORDS: "ETF,ETN,스팩,SPAC"
      MAX_RESULTS: "20"

      # mock: 로컬/초기 검증, kiwoom: 실서버 호출
      DATA_SOURCE: "mock"
      # kiwoom 모드에서 사용
      KIWOOM_CANDIDATES_URL: ${{ vars.KIWOOM_CANDIDATES_URL }}
      KIWOOM_ACCESS_TOKEN: ${{ secrets.KIWOOM_ACCESS_TOKEN }}
      DRY_RUN: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock scan and update Notion
        run: python scripts/update_notion.py
