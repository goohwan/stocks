name: daily-notion-update

on:
  workflow_dispatch:
    inputs:
      data_source:
        description: Data source for this run
        required: true
        default: mock
        type: choice
        options:
          - mock
          - kiwoom
      dry_run:
        description: Skip Notion write for safe testing
        required: true
        default: true
        type: boolean
      rank_api_id:
        description: Kiwoom rank API id (used when data_source=kiwoom)
        required: false
        default: ka10020
        type: string
      market_types:
        description: Comma-separated market types (example: 001,101)
        required: false
        default: 001,101
        type: string
  schedule:
    # KST 12:05 = UTC 03:05 (test run)
    - cron: "5 3 * * *"

jobs:
  update-notion:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID }}
      KIWOOM_APP_KEY: ${{ secrets.KIWOOM_APP_KEY }}
      KIWOOM_APP_SECRET: ${{ secrets.KIWOOM_APP_SECRET }}

      MIN_CHANGE_PCT: "2"
      MAX_CHANGE_PCT: "25"
      MIN_TRADE_VALUE: "10000000000"
      MIN_MARKET_CAP: "300000000000"
      EXCLUDE_KEYWORDS: "ETF,ETN,SPAC"
      MAX_RESULTS: "20"

      KIWOOM_BASE_URL: "https://api.kiwoom.com"
      KIWOOM_ACCESS_TOKEN: ${{ secrets.KIWOOM_ACCESS_TOKEN }}
      KIWOOM_CANDIDATES_URL: ${{ vars.KIWOOM_CANDIDATES_URL }}
      KIWOOM_RANK_API_ID: "ka10020"
      KIWOOM_MRKT_TP_LIST: "001,101"
      KIWOOM_SORT_TP: "3"
      KIWOOM_TRDE_QTY_TP: "00100"
      KIWOOM_STK_CND: "1"
      KIWOOM_CRD_CND: "0"
      KIWOOM_STEX_TP: "1"
      KIWOOM_FALLBACK_MARKET_CAP: "300000000000"

      # Defaults for scheduled runs
      DATA_SOURCE: "kiwoom"
      DRY_RUN: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply manual run inputs
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_DATA_SOURCE: ${{ inputs.data_source }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_RANK_API_ID: ${{ inputs.rank_api_id }}
          INPUT_MARKET_TYPES: ${{ inputs.market_types }}
        shell: bash
        run: |
          echo "DATA_SOURCE=${INPUT_DATA_SOURCE}" >> "$GITHUB_ENV"
          echo "DRY_RUN=${INPUT_DRY_RUN}" >> "$GITHUB_ENV"
          if [ -n "${INPUT_RANK_API_ID}" ]; then
            echo "KIWOOM_RANK_API_ID=${INPUT_RANK_API_ID}" >> "$GITHUB_ENV"
          fi
          if [ -n "${INPUT_MARKET_TYPES}" ]; then
            echo "KIWOOM_MRKT_TP_LIST=${INPUT_MARKET_TYPES}" >> "$GITHUB_ENV"
          fi

      - name: Print run config
        shell: bash
        run: |
          echo "event=${{ github.event_name }}"
          echo "DATA_SOURCE=${DATA_SOURCE}"
          echo "DRY_RUN=${DRY_RUN}"
          echo "KIWOOM_RANK_API_ID=${KIWOOM_RANK_API_ID}"
          echo "KIWOOM_MRKT_TP_LIST=${KIWOOM_MRKT_TP_LIST}"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock scan and update Notion
        run: python scripts/update_notion.py
